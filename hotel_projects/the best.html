<main class="flex-1 p-4 md:p-8 pb-24 md:pb-8 min-w-0">${tab==='dash'?rDash():tab==='menu'?rMenuM():tab==='cats'?rCatsM():tab==='tabs'?rTabsM():rOrdsM()}</main></div>`}

function rDash(){const td=new Date().toDateString(),to=S.orders.filter(o=>new Date(o.time).toDateString()===td),tr=to.reduce((s,o)=>s+gt(o),0),ao=to.length?Math.round(tr/to.length):0;const ic={};S.orders.forEach(o=>o.items.forEach(it=>{ic[it.id]=(ic[it.id]||0)+it.qty}));const ti=Object.entries(ic).sort((a,b)=>b[1]-a[1]).slice(0,5),mx=ti[0]?ti[0][1]:1;const fls=[...new Set(S.tables.map(t=>t.floor))].sort(),fo=fls.map(f=>({f,c:S.orders.filter(o=>o.floor===f).length})),mxf=fo.reduce((m,x)=>Math.max(m,x.c),1);
return`<h1 class="font-display text-2xl font-bold text-white mb-6">${tx('dashboard')}</h1><div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">${[[tx('todayOrders'),to.length,'text-white'],[tx('todayRevenue'),fp(tr),'text-h-amber'],[tx('avgOrder'),fp(ao),'text-white'],[tx('activeOrders'),S.orders.filter(o=>!['delivered'].includes(o.status)).length,'text-h-warn']].map(([l,v,c],i)=>`<div class="sc anim-fu" style="animation-delay:${i*0.05}s"><p class="text-h-stone-400 text-sm mb-1">${l}</p><p class="text-2xl md:text-3xl font-bold ${c}">${v}</p></div>`).join('')}</div>
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="sc anim-fu" style="animation-delay:.2s"><h3 class="text-white font-semibold mb-4">${tx('popularItems')}</h3>${!ti.length?`<p class="text-h-stone-500 text-sm">${tx('noOrders')}</p>`:`<div class="space-y-3">${ti.map(([id,cnt])=>{const it=S.menu.find(i=>i.id===parseInt(id));if(!it)return'';const p=Math.round(cnt/mx*100);return`<div><div class="flex justify-between text-sm mb-1"><span class="text-h-stone-300">${it.name.en}</span><span class="text-h-stone-500">${cnt}</span></div><div class="h-2 bg-h-stone-800 rounded-full overflow-hidden"><div class="h-full bg-h-amber rounded-full" style="width:${p}%"></div></div></div>`}).join('')}</div>`}</div>
<div class="sc anim-fu" style="animation-delay:.25s"><h3 class="text-white font-semibold mb-4">${tx('orders')} by ${tx('floor')}</h3>${!fo.length||!fo.some(x=>x.c)?`<p class="text-h-stone-500 text-sm">${tx('noOrders')}</p>`:`<div class="space-y-3">${fo.map(x=>{const p=Math.round(x.c/mxf*100);return`<div><div class="flex justify-between text-sm mb-1"><span class="text-h-stone-300">${tx('floor')} ${x.f}</span><span class="text-h-stone-500">${x.c}</span></div><div class="h-2 bg-h-stone-800 rounded-full overflow-hidden"><div class="h-full bg-h-ok rounded-full" style="width:${p}%"></div></div></div>`}).join('')}</div>`}</div></div>`}

function rMenuM(){return`<div class="flex items-center justify-between mb-6"><h1 class="font-display text-2xl font-bold text-white">${tx('menuMgmt')}</h1><button class="bt bt-p" onclick="showIF()"><i class="fa-solid fa-plus"></i> ${tx('addItem')}</button></div><div class="space-y-3">${S.menu.map((it,i)=>{const cat=S.cats.find(c=>c.id===it.c);return`<div class="bg-h-panel rounded-xl p-4 flex items-center gap-4 anim-fu" style="animation-delay:${i*0.02}s"><div class="w-14 h-14 rounded-lg bg-h-stone-800 overflow-hidden flex-shrink-0"><img src="${it.img}" alt="" class="w-full h-full object-cover" onerror="this.style.display='none'"></div><div class="flex-1 min-w-0"><div class="flex items-center gap-2 flex-wrap"><h3 class="text-white font-medium text-sm">${it.name.en}</h3>${it.pop?`<span class="bdg bg-h-amber/10 text-h-amber" style="font-size:9px">${tx('popular')}</span>`:''}${it.chef?`<span class="bdg bg-h-amber-l/10 text-h-amber-l" style="font-size:9px">${tx('chefPick')}</span>`:''}${it.out?`<span class="bdg bg-h-err/10 text-h-err" style="font-size:9px">${tx('soldOut')}</span>`:''}</div><p class="text-h-stone-500 text-xs truncate">${cat?cat.name.en:''} · ${fp(it.price)} · ${it.prep||'-'}${tx('prepTime')}</p></div><div class="flex items-center gap-2 flex-shrink-0"><button class="bt bt-s bt-sm" onclick="showIF(${it.id})"><i class="fa-solid fa-pen" style="font-size:10px"></i></button><button class="bt bt-s bt-sm ${it.out?'text-h-ok':'text-h-warn'}" onclick="togOut(${it.id})"><i class="fa-solid ${it.out?'fa-check-circle':'fa-ban'}" style="font-size:10px"></i></button><button class="bt bt-s bt-sm text-h-err" onclick="cfDel(${it.id})"><i class="fa-solid fa-trash" style="font-size:10px"></i></button></div></div>`}).join('')}</div>`}

function rCatsM(){return`<div class="flex items-center justify-between mb-6"><h1 class="font-display text-2xl font-bold text-white">${tx('categories')}</h1><button class="bt bt-p" onclick="showCF()"><i class="fa-solid fa-plus"></i> ${tx('addCategory')}</button></div><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">${S.cats.map((c,i)=>{const cnt=S.menu.filter(m=>m.c===c.id).length;return`<div class="bg-h-panel rounded-xl p-4 anim-fu" style="animation-delay:${i*0.04}s"><div class="flex items-center gap-3 mb-2"><div class="w-10 h-10 rounded-lg bg-h-amber/10 flex items-center justify-center"><i class="fa-solid ${c.icon} text-h-amber"></i></div><div class="flex-1 min-w-0"><p class="text-white font-medium text-sm">${c.name.en}</p><p class="text-h-stone-500 text-xs">${c.name.am} · ${c.name.ar}</p></div></div><p class="text-h-stone-500 text-xs mb-3">${cnt} ${tx('items')}</p><div class="flex gap-2"><button class="bt bt-s bt-sm flex-1" onclick="showCF(${c.id})"><i class="fa-solid fa-pen" style="font-size:10px"></i> ${tx('editItem')}</button><button class="bt bt-s bt-sm text-h-err" onclick="delCat(${c.id})"><i class="fa-solid fa-trash" style="font-size:10px"></i></button></div></div>`}).join('')}</div>`}

function rTabsM(){const fls=[...new Set(S.tables.map(t=>t.floor))].sort(),base=location.origin+location.pathname;
return`<div class="flex items-center justify-between mb-6"><h1 class="font-display text-2xl font-bold text-white">${tx('tables')} & QR</h1></div>
<div class="bg-h-panel rounded-xl p-4 mb-6"><div class="flex flex-wrap items-end gap-3"><div class="flex-1 min-w-[120px]"><label class="text-h-stone-400 text-xs mb-1 block">${tx('tableNum')}</label><input type="number" id="ntn" class="ip" placeholder="e.g. 401" min="101"></div><div class="w-24"><label class="text-h-stone-400 text-xs mb-1 block">${tx('seats')}</label><input type="number" id="nts" class="ip" value="4" min="1" max="20"></div><button class="bt bt-p" onclick="addTb()">${tx('addTable')}</button></div></div>
 ${fls.map(f=>{const ft=S.tables.filter(t=>t.floor===f);return`<div class="mb-8"><h2 class="text-white font-semibold mb-3">${tx('floor')} ${f} <span class="text-h-stone-500 text-sm font-normal">(${ft.length})</span></h2><div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">${ft.map(tb=>`<div class="bg-h-panel rounded-xl p-3 text-center anim-fu"><div class="mb-2" id="qr-${tb.n}"></div><p class="text-white font-bold text-sm">${tb.n}</p><p class="text-h-stone-500 text-xs">${tb.s} ${tx('seats')}</p><button class="text-h-err text-xs mt-2 hover:underline" onclick="delTb(${tb.n})">${tx('deleteItem')}</button></div>`).join('')}</div></div>`}).join('')}`}

function rOrdsM(){const sorted=[...S.orders].sort((a,b)=>new Date(b.time)-new Date(a.time));const sc={received:'text-h-amber bg-h-amber/10',preparing:'text-h-warn bg-h-warn/10',ready:'text-h-ok bg-h-ok/10',delivered:'text-h-stone-400 bg-h-stone-700/50'};
return`<h1 class="font-display text-2xl font-bold text-white mb-6">${tx('orderHistory')}</h1>${!sorted.length?`<div class="text-center py-16 text-h-stone-500"><p>${tx('noOrders')}</p></div>`:`<div class="space-y-3">${sorted.map((o,i)=>`<div class="bg-h-panel rounded-xl p-4 anim-fu" style="animation-delay:${i*0.02}s"><div class="flex items-center justify-between mb-2 flex-wrap gap-2"><div class="flex items-center gap-2"><span class="text-white font-bold text-sm">${tx('orderNum')}${o.id}</span><span class="bdg ${sc[o.status]||''}">${tx(o.status)}</span></div><div class="flex items-center gap-3 text-h-stone-400 text-xs"><span>${tx('table')} ${o.table} · ${tx('floor')} ${o.floor}</span><span>${new Date(o.time).toLocaleString()}</span></div></div><div class="flex flex-wrap gap-1.5 mb-2">${o.items.map(it=>`<span class="bdg bg-h-stone-800 text-h-stone-300" style="font-size:9px">${it.qty}x ${it.name.en}</span>`).join('')}</div>${o.notes?`<p class="text-h-stone-500 text-xs mb-2 italic">"${o.notes}"</p>`:''}<div class="flex items-center justify-between"><span class="text-h-amber font-bold text-sm">${fp(gt(o))}</span>${o.status!=='delivered'?`<div class="flex gap-2">${o.status==='received'?`<button class="bt bt-w bt-sm" onclick="uStatus(${o.id},'preparing')">${tx('markPreparing')}</button>`:''}${o.status==='preparing'?`<button class="bt bt-g bt-sm" onclick="uStatus(${o.id},'ready')">${tx('markReady')}</button>`:''}${o.status==='ready'?`<button class="bt bt-g bt-sm" onclick="mDel(${o.id})">${tx('markDelivered')}</button>`:''}</div>`:''}</div></div>`).join('')}</div>`}`}

function iAdmin(){requestAnimationFrame(()=>{S.tables.forEach(tb=>{const el=document.getElementById('qr-'+tb.n);if(el&&el.childElementCount===0){const url=location.origin+location.pathname+'?table='+tb.n;try{new QRCode(el,{text:url,width:96,height:96,colorDark:'#fafaf9',colorLight:'#292524',correctLevel:QRCode.CorrectLevel.L})}catch(e){}}})})}

/* ===== ADMIN FORMS ===== */
function showIF(id){const it=id?S.menu.find(i=>i.id===id):null;const h=`<div class="mo" onclick="if(event.target===this)this.remove()"><div class="mb p-6 max-h-[90vh] overflow-y-auto"><h2 class="font-display text-xl font-bold text-white mb-5">${it?tx('editItem'):tx('addItem')}</h2><div class="space-y-4"><div><label class="text-h-stone-400 text-xs mb-1 block">${tx('name')} (EN/AM/AR)</label><div class="grid grid-cols-3 gap-2"><input id="ifn1" class="ip text-sm" value="${it?it.name.en:''}" placeholder="English"><input id="ifn2" class="ip text-sm" value="${it?it.name.am:''}" placeholder="አማርኛ"><input id="ifn3" class="ip text-sm" value="${it?it.name.ar:''}" placeholder="العربية"></div></div><div><label class="text-h-stone-400 text-xs mb-1 block">${tx('desc')} (EN/AM/AR)</label><div class="grid grid-cols-3 gap-2"><textarea id="ifd1" class="ip text-sm" rows="2" placeholder="English">${it?it.desc.en||'':''}</textarea><textarea id="ifd2" class="ip text-sm" rows="2" placeholder="አማርኛ">${it?it.desc.am||'':''}</textarea><textarea id="ifd3" class="ip text-sm" rows="2" placeholder="العربية">${it?it.desc.ar||'':''}</textarea></div></div><div class="grid grid-cols-2 gap-3"><div><label class="text-h-stone-400 text-xs mb-1 block">${tx('price')} (${tx('currency')})</label><input type="number" id="ifp" class="ip" value="${it?it.price:''}" min="0"></div><div><label class="text-h-stone-400 text-xs mb-1 block">${tx('category')}</label><select id="ifc" class="ip">${S.cats.map(c=>`<option value="${c.id}" ${it&&it.c===c.id?'selected':''}>${c.name.en}</option>`).join('')}</select></div></div><div class="grid grid-cols-2 gap-3"><div><label class="text-h-stone-400 text-xs mb-1 block">${tx('image')}</label><input id="ifi" class="ip text-sm" value="${it?it.img:''}" placeholder="URL"></div><div><label class="text-h-stone-400 text-xs mb-1 block">${tx('prepTimeLabel')} (${tx('prepTime')})</label><input type="number" id="ifpr" class="ip" value="${it?it.prep||'':''}" min="0"></div></div><div class="flex gap-6"><label class="flex items-center gap-2 cursor-pointer text-sm text-h-stone-300"><input type="checkbox" id="ifpo" ${it&&it.pop?'checked':''} class="w-4 h-4 accent-amber-500"> ${tx('popular')}</label><label class="flex items-center gap-2 cursor-pointer text-sm text-h-stone-300"><input type="checkbox" id="ifch" ${it&&it.chef?'checked':''} class="w-4 h-4 accent-amber-500"> ${tx('chefPick')}</label></div><div class="flex gap-3 pt-2"><button class="bt bt-p flex-1" onclick="svIt(${id||'null'})">${tx('save')}</button><button class="bt bt-s flex-1" onclick="document.querySelector('.mo').remove()">${tx('cancel')}</button></div></div></div></div>`;document.body.insertAdjacentHTML('beforeend',h)}

function svIt(id){const nm={en:document.getElementById('ifn1').value.trim(),am:document.getElementById('ifn2').value.trim(),ar:document.getElementById('ifn3').value.trim()};const ds={en:document.getElementById('ifd1').value.trim(),am:document.getElementById('ifd2').value.trim(),ar:document.getElementById('ifd3').value.trim()};const pr=parseInt(document.getElementById('ifp').value)||0,ci=parseInt(document.getElementById('ifc').value),im=document.getElementById('ifi').value.trim(),pp=parseInt(document.getElementById('ifpr').value)||0,po=document.getElementById('ifpo').checked,ch=document.getElementById('ifch').checked;if(!nm.en){toast('Name (EN) required','err');return}if(id){const it=S.menu.find(i=>i.id===id);if(it)Object.assign(it,{name:nm,desc:ds,price:pr,c:ci,img:im,prep:pp,pop:po,chef:ch})}else{const nid=Math.max(0,...S.menu.map(i=>i.id))+1;S.menu.push({id:nid,name:nm,desc:ds,price:pr,c:ci,img:im,prep:pp,pop:po,chef:ch,out:0})}sv('hm',S.menu);bc('mu',{});toast(tx('save'),'ok');document.querySelector('.mo')?.remove();render()}

function togOut(id){const it=S.menu.find(i=>i.id===id);if(it){it.out=!it.out;sv('hm',S.menu);bc('mu',{});render()}}
function cfDel(id){const h=`<div class="mo" onclick="if(event.target===this)this.remove()"><div class="mb p-6 text-center"><i class="fa-solid fa-triangle-exclamation text-h-err text-3xl mb-4"></i><p class="text-white mb-6">${tx('confirmDelete')}</p><div class="flex gap-3"><button class="bt bt-d flex-1" onclick="delIt(${id});document.querySelector('.mo').remove()">${tx('yes')}</button><button class="bt bt-s flex-1" onclick="document.querySelector('.mo').remove()">${tx('no')}</button></div></div></div>`;document.body.insertAdjacentHTML('beforeend',h)}
function delIt(id){S.menu=S.menu.filter(i=>i.id!==id);sv('hm',S.menu);bc('mu',{});render()}

function showCF(id){const c=id?S.cats.find(x=>x.id===id):null;const h=`<div class="mo" onclick="if(event.target===this)this.remove()"><div class="mb p-6"><h2 class="font-display text-xl font-bold text-white mb-5">${c?tx('editItem'):tx('addCategory')}</h2><div class="space-y-4"><div><label class="text-h-stone-400 text-xs mb-1 block">${tx('name')} (EN/AM/AR)</label><div class="grid grid-cols-3 gap-2"><input id="cfn1" class="ip text-sm" value="${c?c.name.en:''}" placeholder="English"><input id="cfn2" class="ip text-sm" value="${c?c.name.am:''}" placeholder="አማርኛ"><input id="cfn3" class="ip text-sm" value="${c?c.name.ar:''}" placeholder="العربية"></div></div><div><label class="text-h-stone-400 text-xs mb-1 block">${tx('icon')} (Font Awesome)</label><input id="cfi" class="ip text-sm" value="${c?c.icon:'fa-utensils'}" placeholder="fa-utensils"></div><div class="flex gap-3"><button class="bt bt-p flex-1" onclick="svCat(${id||'null'})">${tx('save')}</button><button class="bt bt-s flex-1" onclick="document.querySelector('.mo').remove()">${tx('cancel')}</button></div></div></div></div>`;document.body.insertAdjacentHTML('beforeend',h)}
function svCat(id){const nm={en:document.getElementById('cfn1').value.trim(),am:document.getElementById('cfn2').value.trim(),ar:document.getElementById('cfn3').value.trim()};const ic=document.getElementById('cfi').value.trim()||'fa-utensils';if(!nm.en){toast('Name (EN) required','err');return}if(id){const c=S.cats.find(x=>x.id===id);if(c)Object.assign(c,{name:nm,icon:ic})}else{const nid=Math.max(0,...S.cats.map(x=>x.id))+1;S.cats.push({id:nid,name:nm,icon:ic})}sv('hca',S.cats);bc('mu',{});toast(tx('save'),'ok');document.querySelector('.mo')?.remove();render()}
function delCat(id){if(S.menu.some(i=>i.c===id)){toast('Has menu items','err');return}S.cats=S.cats.filter(c=>c.id!==id);sv('hca',S.cats);bc('mu',{});render()}

function addTb(){const n=parseInt(document.getElementById('ntn').value),s=parseInt(document.getElementById('nts').value)||4;if(!n||n<100){toast(tx('invalidTable'),'err');return}if(S.tables.some(t=>t.n===n)){toast(tx('tableExists'),'err');return}S.tables.push({n,f:gf(n),floor:gf(n),s});sv('ht',S.tables);toast(tx('save'),'ok');render()}
function delTb(n){S.tables=S.tables.filter(t=>t.n!==n);sv('ht',S.tables);render()}
function cfReset(){const h=`<div class="mo" onclick="if(event.target===this)this.remove()"><div class="mb p-6 text-center"><i class="fa-solid fa-triangle-exclamation text-h-warn text-3xl mb-4"></i><p class="text-white mb-6">${tx('confirmReset')}</p><div class="flex gap-3"><button class="bt bt-d flex-1" onclick="resetAll();document.querySelector('.mo').remove()">${tx('yes')}</button><button class="bt bt-s flex-1" onclick="document.querySelector('.mo').remove()">${tx('no')}</button></div></div></div>`;document.body.insertAdjacentHTML('beforeend',h)}
function resetAll(){S.menu=[...DM];S.cats=[...DC];S.tables=[...DT];S.orders=[];S.notifs=[];S.loid=1000;S.cart=[];S.notes='';svA();bc('mu',{});toast('Data reset','ok');render()}

/* ===== START ===== */
render();
</script>
</body>
</html>
